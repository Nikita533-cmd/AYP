services:
  django:
    build:
      dockerfile: etc/django.Dockerfile
      context: .
    command: uwsgi --http :8000 --processes 2 --threads 4 --module main.wsgi
    ports:
      - "8000:8000"
    environment:
      - C_FORCE_ROOT=true
    volumes:
      - .:/webapp
      - ./media:/media
      - ./static:/webapp/static
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=ryPeqdZznz74
      - POSTGRES_USER=postgres
    volumes:
      - postgres-volume:/var/lib/postgresql/data

  redis:
    image: redis:6.2.4-alpine
    volumes:
      - redis-volume:/data

  nginx:
    image: nginx:alpine
    ports:
        - "80:80"     # HTTP → HTTPS редирект
        - "443:443"   # HTTPS
    volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf
        - ./static:/static          # ← собраная статика
        - ./media:/media
        - ./ssl:/etc/nginx/ssl
    depends_on:
        - django

volumes:
  postgres-volume:
  redis-volume:
  media:
